<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase 验证与数据初始化</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; padding: 40px; min-height: 100vh; }
        .container { max-width: 700px; margin: 0 auto; }
        h1 { font-size: 28px; margin-bottom: 8px; color: #fff; }
        .subtitle { color: #94a3b8; margin-bottom: 32px; font-size: 14px; }
        .card { background: #1e293b; border-radius: 12px; padding: 24px; margin-bottom: 16px; border: 1px solid #334155; }
        .card-header { display: flex; align-items: center; gap: 12px; }
        .step-num { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0; }
        .step-title { font-size: 16px; font-weight: 600; color: #fff; }
        .status { padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-top: 12px; }
        .status.pending { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
        .status.running { background: #1e3a5f; color: #7dd3fc; border: 1px solid #1d4ed8; }
        .status.success { background: #052e16; color: #4ade80; border: 1px solid #16a34a; }
        .status.error { background: #450a0a; color: #f87171; border: 1px solid #dc2626; }
        .btn { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; border: none; padding: 14px 32px; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 24px; transition: opacity 0.2s; }
        .btn:hover { opacity: 0.9; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .badge { margin-left: auto; display: inline-flex; align-items: center; gap: 6px; background: #059669; color: #fff; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
        .detail { margin-top: 12px; font-size: 13px; color: #cbd5e1; line-height: 1.8; }
        .refresh-btn { background: #334155; color: #e2e8f0; border: none; padding: 6px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; }
        .refresh-btn:hover { background: #475569; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Supabase 验证</h1>
        <p class="subtitle">检测表是否已创建，并写入初始数据</p>

        <button class="btn" id="runBtn" onclick="runAll()">开始验证</button>
        <div id="results"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://vgyklddspgvtbwvegsob.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_n9gfFPMnLr8ZiuAJdyT0WQ_ywxZWMnq';

        function getClient() {
            if (!window._client) {
                window._client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
                    auth: { autoRefreshToken: false, persistSession: false },
                    db: { schema: 'public' }
                });
            }
            return window._client;
        }

        function addCard(num, title) {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = 'card';
            div.id = 'card-' + num;
            div.innerHTML = `
                <div class="card-header">
                    <div class="step-num">${num}</div>
                    <div class="step-title">${title}</div>
                    <span id="badge-${num}" class="badge" style="display:none;">✓</span>
                </div>
                <div class="status pending" id="status-${num}">等待中...</div>
                <div class="detail" id="detail-${num}"></div>
            `;
            results.appendChild(div);
        }

        function setStatus(num, status, message) {
            const el = document.getElementById('status-' + num);
            const badge = document.getElementById('badge-' + num);
            el.className = 'status ' + status;
            el.textContent = message;
            if (status === 'success') badge.style.display = 'inline-flex';
        }

        function setDetail(num, html) {
            document.getElementById('detail-' + num).innerHTML = html;
        }

        async function runAll() {
            const btn = document.getElementById('runBtn');
            btn.disabled = true;
            btn.textContent = '检测中...';
            document.getElementById('results').innerHTML = '';
            const c = getClient();

            // 1. Check orders table
            addCard(1, '检查 orders 表');
            const { data: orders, error: ordersErr } = await c.from('orders').select('*').limit(1);
            if (ordersErr) {
                setStatus(1, 'error', '❌ orders 表不存在: ' + ordersErr.message);
                setDetail(1, '<p style="color:#f87171;">请在 Supabase SQL Editor 执行 database/schema.sql 中的 SQL</p>');
            } else {
                setStatus(1, 'success', '✓ orders 表已存在');
                setDetail(1, '<p>表中暂无数据，等待写入订单。</p>');
            }

            // 2. Check config table
            addCard(2, '检查 config 表');
            if (ordersErr) {
                setStatus(2, 'pending', '⏸ 跳过（orders 表不存在）');
            } else {
                const { data: configs, error: configErr } = await c.from('config').select('*').limit(1);
                if (configErr) {
                    setStatus(2, 'error', '❌ config 表不存在: ' + configErr.message);
                } else {
                    setStatus(2, 'success', '✓ config 表已存在');
                    setDetail(2, '<p>表中暂无数据，等待写入配置。</p>');
                }

                // 3. Write initial config data
                addCard(3, '写入初始配置数据');
                if (!configErr) {
                    const appData = {
                        therapists: [
                            { id: 1, name: '王师傅' },
                            { id: 2, name: '李师傅' },
                            { id: 3, name: '张师傅' },
                            { id: 4, name: '刘师傅' },
                            { id: 5, name: '陈师傅' }
                        ],
                        beds: [
                            { id: 1, name: '1号床' },
                            { id: 2, name: '2号床' },
                            { id: 3, name: '3号床' },
                            { id: 4, name: '4号床' },
                            { id: 5, name: '5号床' }
                        ],
                        services: [
                            { id: 1, name: '足疗 60min', duration: 60, price: 198, commission: 60 },
                            { id: 2, name: '足疗 90min', duration: 90, price: 298, commission: 90 },
                            { id: 3, name: '精油 SPA 60min', duration: 60, price: 268, commission: 80 },
                            { id: 4, name: '精油 SPA 90min', duration: 90, price: 398, commission: 120 },
                            { id: 5, name: '推拿 60min', duration: 60, price: 198, commission: 60 },
                            { id: 6, name: '推拿 90min', duration: 90, price: 298, commission: 90 },
                            { id: 7, name: '泰式按摩 90min', duration: 90, price: 368, commission: 100 }
                        ],
                        settings: { therapistCount: 5, bedCount: 5, addonPrice30: 99, addonPrice60: 168 },
                        rotationState: { lastDate: null, lastTherapistId: null }
                    };

                    const { error: upsertErr } = await c.from('config').upsert({ key: 'app_data', data: appData }, { onConflict: 'key' });
                    if (upsertErr) {
                        setStatus(3, 'error', '❌ 写入失败: ' + upsertErr.message);
                    } else {
                        setStatus(3, 'success', '✓ 配置数据已写入');
                        setDetail(3, `
                            <p>技师: 王师傅、李师傅、张师傅、刘师傅、陈师傅</p>
                            <p>床位: 1号床 ~ 5号床</p>
                            <p>项目: 足疗/精油SPA/推拿/泰式按摩（共7个）</p>
                        `);
                    }
                } else {
                    setStatus(3, 'pending', '⏸ 跳过（config 表不存在）');
                }

                // 4. Verify
                addCard(4, '验证');
                const { data: verify, error: verifyErr } = await c.from('config').select('*').eq('key', 'app_data').single();
                if (verifyErr) {
                    setStatus(4, 'error', '❌ 验证失败: ' + verifyErr.message);
                } else {
                    const d = verify.data;
                    setStatus(4, 'success', '✓ 所有数据验证通过！');
                    setDetail(4, `
                        <p>✓ 技师: ${d.therapists.map(t => t.name).join('、')}</p>
                        <p>✓ 床位: ${d.beds.length} 个</p>
                        <p>✓ 项目: ${d.services.length} 个</p>
                        <p style="margin-top:12px;color:#4ade80;">✓ 可以打开 <strong>index.html</strong> 开始使用了</p>
                    `);
                }
            }

            btn.disabled = false;
            btn.textContent = '重新验证';
        }
    </script>
</body>
</html>
