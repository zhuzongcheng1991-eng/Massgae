<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase 数据库设置</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; padding: 40px; min-height: 100vh; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { font-size: 28px; margin-bottom: 8px; color: #fff; }
        .subtitle { color: #94a3b8; margin-bottom: 32px; font-size: 14px; }
        .card { background: #1e293b; border-radius: 12px; padding: 24px; margin-bottom: 16px; border: 1px solid #334155; }
        .card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .step-num { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; }
        .step-title { font-size: 16px; font-weight: 600; color: #fff; }
        .status { padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-top: 12px; }
        .status.pending { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
        .status.running { background: #1e3a5f; color: #7dd3fc; border: 1px solid #1d4ed8; }
        .status.success { background: #052e16; color: #4ade80; border: 1px solid #16a34a; }
        .status.error { background: #450a0a; color: #f87171; border: 1px solid #dc2626; }
        .btn { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; border: none; padding: 14px 32px; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 24px; transition: opacity 0.2s; }
        .btn:hover { opacity: 0.9; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-sm { width: auto; padding: 8px 16px; font-size: 13px; margin-top: 0; margin-left: 8px; }
        .sql-box { background: #0f172a; padding: 16px; border-radius: 8px; font-family: monospace; font-size: 12px; color: #94a3b8; white-space: pre-wrap; word-break: break-all; margin-top: 12px; max-height: 300px; overflow-y: auto; line-height: 1.6; }
        .actions { display: flex; align-items: center; justify-content: space-between; margin-top: 16px; }
        .success-badge { display: inline-flex; align-items: center; gap: 6px; background: #059669; color: #fff; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Supabase 数据库设置</h1>
        <p class="subtitle">检测 Supabase 中的表是否已创建，并写入初始数据</p>

        <button class="btn" id="runBtn" onclick="runCheck()">开始检测</button>

        <div id="results"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://vgyklddspgvtbwvegsob.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_n9gfFPMnLr8ZiuAJdyT0WQ_ywxZWMnq';

        let client = null;
        function getClient() {
            if (!client && window.supabase) {
                client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
                    auth: { autoRefreshToken: false, persistSession: false },
                    db: { schema: 'public' }
                });
            }
            return client;
        }

        // 建表 SQL
        const SETUP_SQL = `-- 创建订单表
CREATE TABLE IF NOT EXISTS orders (
    id BIGSERIAL PRIMARY KEY,
    date DATE NOT NULL UNIQUE,
    data JSONB NOT NULL,
    created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW(),
    updated_at TIMESTAMP WITH TIME ZONE DEFAULT NOW()
);

-- 创建配置表
CREATE TABLE IF NOT EXISTS config (
    id BIGSERIAL PRIMARY KEY,
    key TEXT NOT NULL UNIQUE,
    data JSONB NOT NULL,
    created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW(),
    updated_at TIMESTAMP WITH TIME ZONE DEFAULT NOW()
);

-- 索引
CREATE INDEX IF NOT EXISTS idx_orders_date ON orders(date);
CREATE INDEX IF NOT EXISTS idx_config_key ON config(key);

-- 自动更新时间戳
CREATE OR REPLACE FUNCTION update_updated_at()
RETURNS TRIGGER AS $$
BEGIN
    NEW.updated_at = NOW();
    RETURN NEW;
END;
$$ LANGUAGE plpgsql;

DROP TRIGGER IF EXISTS trg_orders_updated_at ON orders;
CREATE TRIGGER trg_orders_updated_at BEFORE UPDATE ON orders FOR EACH ROW EXECUTE FUNCTION update_updated_at();

DROP TRIGGER IF EXISTS trg_config_updated_at ON config;
CREATE TRIGGER trg_config_updated_at BEFORE UPDATE ON config FOR EACH ROW EXECUTE FUNCTION update_updated_at();

-- 启用实时同步
ALTER PUBLICATION supabase_realtime ADD TABLE orders;
ALTER PUBLICATION supabase_realtime ADD TABLE config;

-- 行级安全策略
DROP POLICY IF EXISTS "allow_read_orders" ON orders;
DROP POLICY IF EXISTS "allow_write_orders" ON orders;
DROP POLICY IF EXISTS "allow_read_config" ON config;
DROP POLICY IF EXISTS "allow_write_config" ON config;

CREATE POLICY "allow_read_orders" ON orders FOR SELECT USING (true);
CREATE POLICY "allow_write_orders" ON orders FOR ALL USING (true) WITH CHECK (true);
CREATE POLICY "allow_read_config" ON config FOR SELECT USING (true);
CREATE POLICY "allow_write_config" ON config FOR ALL USING (true) WITH CHECK (true);`;

        function addCard(container, num, title) {
            const div = document.createElement('div');
            div.className = 'card';
            div.id = 'card-' + num;
            div.innerHTML = `
                <div class="card-header">
                    <div class="step-num">${num}</div>
                    <div class="step-title">${title}</div>
                    <span id="badge-${num}" style="margin-left:auto;display:none;"></span>
                </div>
                <div class="status pending" id="status-${num}">等待中...</div>
                <div id="detail-${num}"></div>
            `;
            container.appendChild(div);
            return div;
        }

        function setStatus(num, status, message) {
            const el = document.getElementById('status-' + num);
            const badge = document.getElementById('badge-' + num);
            el.className = 'status ' + status;
            el.textContent = message;
            if (status === 'success') {
                badge.style.display = 'inline-flex';
                badge.className = 'success-badge';
                badge.textContent = '✓ 完成';
            }
        }

        function setDetail(num, html) {
            document.getElementById('detail-' + num).innerHTML = html;
        }

        async function runCheck() {
            const btn = document.getElementById('runBtn');
            btn.disabled = true;
            btn.textContent = '检测中...';
            const results = document.getElementById('results');
            results.innerHTML = '';

            const c = getClient();
            if (!c) {
                alert('Supabase SDK 加载失败');
                btn.disabled = false;
                btn.textContent = '重试';
                return;
            }

            // Step 1: Check orders table
            addCard(results, 1, '检查 orders 表');
            const { data: orderData, error: orderError } = await c.from('orders').select('id').limit(1);

            if (orderError) {
                setStatus(1, 'error', 'orders 表不存在或不可访问');
                setDetail(1, `
                    <p style="color:#f87171;font-size:13px;margin-top:8px;">错误信息：${orderError.message}</p>
                    <div class="actions">
                        <p style="font-size:13px;color:#94a3b8;">请在 Supabase SQL Editor 执行以下 SQL：</p>
                        <button class="btn btn-sm" onclick="copySQL()">📋 复制 SQL</button>
                    </div>
                    <div class="sql-box" id="sqlContent">${SETUP_SQL}</div>
                    <p style="font-size:12px;color:#94a3b8;margin-top:12px;">
                        操作步骤：打开 <a href="https://supabase.com/dashboard" target="_blank" style="color:#667eea;">Supabase Dashboard</a> → 项目 → SQL Editor → 粘贴 → Run
                    </p>
                `);
            } else {
                setStatus(1, 'success', `orders 表已存在，共 ${orderData.length || 0}+ 条记录`);
            }

            // Step 2: Check config table
            addCard(results, 2, '检查 config 表');
            const { data: configData, error: configError } = await c.from('config').select('id').limit(1);

            if (configError) {
                setStatus(2, 'error', 'config 表不存在或不可访问');
                if (!orderError) {
                    setDetail(2, `
                        <div class="actions">
                            <p style="font-size:13px;color:#94a3b8;">请在 Supabase SQL Editor 执行：</p>
                            <button class="btn btn-sm" onclick="copySQL()">📋 复制 SQL</button>
                        </div>
                        <div class="sql-box">${SETUP_SQL}</div>
                    `);
                }
            } else {
                setStatus(2, 'success', 'config 表已存在');
            }

            // Step 3: Write initial data
            addCard(results, 3, '写入初始配置数据');
            if (!orderError && !configError) {
                const appConfig = {
                    key: 'app_data',
                    data: {
                        therapists: [
                            { id: 1, name: '王师傅' },
                            { id: 2, name: '李师傅' },
                            { id: 3, name: '张师傅' },
                            { id: 4, name: '刘师傅' },
                            { id: 5, name: '陈师傅' }
                        ],
                        beds: [
                            { id: 1, name: '1号床' },
                            { id: 2, name: '2号床' },
                            { id: 3, name: '3号床' },
                            { id: 4, name: '4号床' },
                            { id: 5, name: '5号床' }
                        ],
                        services: [
                            { id: 1, name: '足疗 60min', duration: 60, price: 198, commission: 60 },
                            { id: 2, name: '足疗 90min', duration: 90, price: 298, commission: 90 },
                            { id: 3, name: '精油 SPA 60min', duration: 60, price: 268, commission: 80 },
                            { id: 4, name: '精油 SPA 90min', duration: 90, price: 398, commission: 120 },
                            { id: 5, name: '推拿 60min', duration: 60, price: 198, commission: 60 },
                            { id: 6, name: '推拿 90min', duration: 90, price: 298, commission: 90 },
                            { id: 7, name: '泰式按摩 90min', duration: 90, price: 368, commission: 100 }
                        ],
                        settings: { therapistCount: 5, bedCount: 5, addonPrice30: 99, addonPrice60: 168 },
                        rotationState: { lastDate: null, lastTherapistId: null }
                    }
                };

                const { error: upsertError } = await c.from('config').upsert(appConfig, { onConflict: 'key' });
                if (upsertError) {
                    setStatus(3, 'error', '写入失败: ' + upsertError.message);
                } else {
                    setStatus(3, 'success', '配置数据已写入 (key=app_data)');
                    setDetail(3, '<p style="font-size:13px;color:#94a3b8;margin-top:8px;">技师: 王师傅、李师傅、张师傅、刘师傅、陈师傅 | 床位: 5个 | 项目: 7个</p>');
                }
            } else {
                setStatus(3, 'pending', '⏸ 跳过 — 表不存在，请先创建表');
            }

            // Step 4: Verify
            addCard(results, 4, '验证');
            if (!orderError && !configError) {
                const { data: verify, error: verifyError } = await c.from('config').select('*').eq('key', 'app_data').single();
                if (verifyError) {
                    setStatus(4, 'error', '验证失败: ' + verifyError.message);
                } else {
                    setStatus(4, 'success', '所有数据验证通过！');
                    setDetail(4, '<p style="font-size:13px;color:#4ade80;margin-top:8px;">✓ 可以打开 index.html 开始使用了</p>');
                }
            } else {
                setStatus(4, 'pending', '⏸ 等待表创建后再验证');
                setDetail(4, '<button class="btn btn-sm" onclick="runCheck()" style="margin-top:12px;">🔄 创建表后点击重新检测</button>');
            }

            btn.disabled = false;
            btn.textContent = '重新检测';
        }

        function copySQL() {
            const sql = document.getElementById('sqlContent').textContent;
            navigator.clipboard.writeText(sql).then(() => {
                alert('SQL 已复制到剪贴板！');
            }).catch(() => {
                // Fallback
                const textarea = document.createElement('textarea');
                textarea.value = sql;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                alert('SQL 已复制到剪贴板！');
            });
        }
    </script>
</body>
</html>
